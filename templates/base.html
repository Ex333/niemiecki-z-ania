{% load static %}
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">

    <title>{% block title %}Niemiecki z Anią{% endblock %}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

    <!-- 🔝 NAVBAR -->
    <header class="navbar">
        <div class="nav-container">

            <!-- LOGO -->
            <a href="/" class="logo">
                <img src="{% static 'images/logo.png' %}" alt="Niemiecki z Anią logo">
            </a>

            <!-- MENU -->
            <nav class="nav-links">
                <a href="/">Start</a>
                <a href="/materialy/">Materiały</a>
                <a href="/sklep/" class="btn-nav">Sklep</a>
                <a href="/kontakt/">Kontakt</a>
            </nav>

        </div>
    </header>

    <!-- 📦 CONTENT -->
    <main class="main-content">
        {% block content %}
        {% endblock %}
    </main>

    <!-- 🔻 FOOTER -->
    <footer class="footer">
        <div class="footer-container">

            <div class="footer-col">
                <h3>Niemiecki z Anią 🇩🇪</h3>
                <p>Nauka niemieckiego w praktyczny i przyjemny sposób.</p>
            </div>

            <div class="footer-col footer-links">
                <h4>Linki</h4>
                <a href="/">Start</a>
                <a href="/materialy/">Materiały</a>
                <a href="/sklep/">Sklep</a>
                <a href="/kontakt/">Kontakt</a>
            </div>

        </div>

        <div class="footer-bottom">
            <p>© 2026 Niemiecki z Anią. Wszystkie prawa zastrzeżone.</p>
        </div>
    </footer>

</body>
</html>
